upstream client {
    server robot_client:80;
}

upstream backend {
    server robot_server:8080;
}

upstream mqtt_broker {
    server robot_mqtt:9001;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name i14c203.p.ssafy.io;

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name i14c203.p.ssafy.io;

    ssl_certificate /etc/letsencrypt/live/i14c203.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/i14c203.p.ssafy.io/privkey.pem;

    # SSL Security Setting
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. 프론트엔드 (React)
    location / {
        proxy_pass http://client;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. 백엔드 API (Spring Boot)
    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mqtt {
        proxy_pass http://mqtt_broker;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # 3. 웹소켓 (STOMP - 로봇 데이터)
    location /ws {
        proxy_pass http://backend/api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # 4. 웹소켓 (WebRTC - 영상 통화)
    location /signal {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        proxy_read_timeout 86400;
    }

    # [5] 웹소켓 (자율주행차 통신 - ROS2)
    location /ros2 {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;

        proxy_read_timeout 86400;
    }

    # [6] 이미지/동영상 갤러리 (저장소)
    location /uploads {
        alias /var/www/uploads;
        autoindex off;
        access_log off;

        expires 30d;
        add_header Cache-Control "public, no-transform";

        add_header Access-Control-Allow-Origin *;
    }

    location /videos/ {
    alias /home/ssafy/videos/;  # 실제 영상 저장 경로
    autoindex on;
    add_header Access-Control-Allow-Origin *; # 👈 이거 중요!
}
}
