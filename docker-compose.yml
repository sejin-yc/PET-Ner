services:
  # 1. Database: PostgreSQL
  robot_db:
    image: postgres:15
    container_name: robot_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - robot_network

  # 2. MQTT Broker: Mosquitto
  robot_mqtt:
    image: eclipse-mosquitto:2.0
    container_name: robot_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: always
    networks:
      - robot_network

  # 3. Backend: Spring Boot
  robot_server:
    build: ./server
    container_name: robot_server
    ports:
      - "8080:8080"
    depends_on:
      - robot_db
      - robot_mqtt
      - cosyvoice_service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://robot_db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MQTT_BROKER_URL: tcp://robot_mqtt:1883
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      COSYVOICE_SERVICE_URL: http://cosyvoice_service:50001
    volumes:
      - ./uploads:/app/uploads
    networks:
      - robot_network

  # 6. CosyVoice Service: 음성 토큰 추출 서비스
  cosyvoice_service:
    build: 
      context: ..
      dockerfile: S14P11C203/cosyvoice_service/Dockerfile
    container_name: cosyvoice_service
    ports:
      - "50001:50001"
    volumes:
      - ./uploads:/app/uploads
      - ../CosyVoice:/app/CosyVoice
      - ./cosyvoice_models:/root/.cache/modelscope  # 모델 캐시 저장 (재사용)
      - ./cosyvoice_service/extract_tokens_api.py:/app/extract_tokens_api.py  # 개발용: 코드 수정 시 재빌드 불필요
    environment:
      PORT: 50001
      # 실제 캐시 폴더명(0.5 → 0___5). 이렇게 하면 [Errno 17] File exists 방지
      COSYVOICE_MODEL_DIR: FunAudioLLM/Fun-CosyVoice3-0___5B-2512
    networks:
      - robot_network
  
  # 4. Frontend: React Client
  robot_client:
    build: ./client
    container_name: robot_client
    networks:
      - robot_network
  
  # 5. Gateway: Nginx
  robot_nginx:
    build: ./nginx
    container_name: robot_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      # - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./uploads:/var/www/uploads
    depends_on:
      - robot_client
      - robot_server
    networks:
      - robot_network

networks:
  robot_network:
    driver: bridge