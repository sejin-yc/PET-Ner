services:
  # 1. Database: PostgreSQL
  robot_db:
    image: postgres:15
    container_name: robot_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - robot_network

  # 2. MQTT Broker: Mosquitto
  robot_mqtt:
    image: eclipse-mosquitto:2.0
    container_name: robot_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: always
    networks:
      - robot_network

  # 3. Backend: Spring Boot
  # 만약 서버도 도커로 띄우고 싶다면 아래 주석을 해제하세요.
  robot_server:
    build: ./server
    container_name: robot_server
    ports:
      - "8080:8080"
    depends_on:
      - robot_db
      - robot_mqtt
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://robot_db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MQTT_BROKER_URL: tcp://robot_mqtt:1883
    networks:
      - robot_network

networks:
  robot_network:
    driver: bridge