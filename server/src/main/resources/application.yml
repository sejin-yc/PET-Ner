server:
  port: 8080 # 서버 포트 번호

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: jdbc:postgresql://postgres:5432/robot_db
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # 쿼리에 주석 포함하여 디버깅 용이하게 설정
        use_sql_comments: true 
    open-in-view: false

# JWT 설정
jwt:
  secret: ${JWT_SECRET}

# MQTT 설정
mqtt:
  broker-url: tcp://mosquitto:1883
  client-id: spring-boot-server-docker
  default-topic: "/#"
  username: ssafy
  password: ssafy1

# CosyVoice 서비스 (TTS)
cosyvoice:
  service:
    url: ${COSYVOICE_SERVICE_URL:http://cosyvoice_service:50001}

# Jetson 음성 토큰 전송 (선택)
jetson:
  voice:
    url: ${JETSON_VOICE_URL:}

logging:
  level:
    root: INFO
    com.ssafy.robot_server: DEBUG
