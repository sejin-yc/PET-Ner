spring:
  datasource:
    # ✅ PostgreSQL 주소 (포트 5432 확인)
    url: jdbc:postgresql://robot_db:5432/robot_db
    # ✅ 설치할 때 설정한 아이디/비밀번호 입력 필수!
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 🚨 중요: create는 매번 지우고 다시 만듦. update는 데이터 유지함!
      ddl-auto: update 
    properties:
      hibernate:
        format_sql: true
        # PostgreSQL 방언 설정
        dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT 설정 (유지)
jwt:
  secret: ThisIsASecretKeyForRobotProjectMustBeVeryLongToWorkCorrectly123456

# MQTT 설정 (유지 - 만약 MQTT 브로커가 안 켜져 있으면 에러가 날 수 있음)
# 당장 MQTT를 안 쓴다면 이 부분 때문에 서버가 꺼질 수도 있으니, 
# 서버가 안 켜지면 mqtt 부분을 주석 처리(#) 해보세요.
mqtt:
  broker-url: tcp://mqtt_broker:1883
  client-id: spring-boot-server
  default-topic: "#"