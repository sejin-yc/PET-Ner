server:
  port: 8080 # 서버 포트 번호

spring:
  datasource:
    # 도커 환경이 아니면 robot_db를 localhost로 수정하세요!
    url: jdbc:postgresql://robot_db:5432/robot_db
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # update: 테이블 유지 및 변경사항 반영
      # create: 매번 테이블 삭제 후 재생성 (주의!)
      ddl-auto: update 
    show-sql: true # ✅ 콘솔에 SQL 문 출력
    properties:
      hibernate:
        format_sql: true # SQL 예쁘게 출력
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # 쿼리에 주석 포함하여 디버깅 용이하게 설정
        use_sql_comments: true 

# JWT 설정 (보안을 위해 비밀키는 32자 이상의 긴 문자열 유지)
jwt:
  secret: ${JWT_SECRET}

# MQTT 설정
# 브로커가 실행 중이 아니면 서버 기동 시 에러가 날 수 있습니다.
mqtt:
  # broker-url: tcp://mqtt_broker:1883 # 도커 환경이 아니면 localhost로 수정
  broker-url: tcp://robot_mqtt:1883
  client-id: spring-boot-server
  default-topic: "robot/#" # 필요한 토픽 범위로 한정하는 것이 효율적

# CosyVoice 서비스 설정
# - Docker 안에서 백엔드 실행: cosyvoice_service:50001 (기본값)
# - 로컬에서 백엔드 실행: --spring.profiles.active=local 또는 COSYVOICE_SERVICE_URL=http://localhost:50001
cosyvoice:
  service:
    url: ${COSYVOICE_SERVICE_URL:http://cosyvoice_service:50001}

# Jetson 음성 토큰 전송 (선택)
# - 비어 있으면 로그인/학습 후 토큰 전송 안 함. 설정 시 POST {url}/voices/upload_token 로 JSON 전송
jetson:
  voice:
    url: ${JETSON_VOICE_URL:}